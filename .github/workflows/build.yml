name: Build and Sign iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Certificate ────────────────────────────────────────────────────────
      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ci_keychain_password
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to use the key without a dialog
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          rm /tmp/certificate.p12

      # ── Provisioning Profile ────────────────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision

          # Decode the signed profile into a plain plist so we can extract fields
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile_decoded.plist

          PP_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile_decoded.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' /tmp/profile_decoded.plist)
          PP_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile_decoded.plist)

          echo "PP_UUID=$PP_UUID"   >> "$GITHUB_ENV"
          echo "TEAM_ID=$TEAM_ID"   >> "$GITHUB_ENV"
          echo "PP_NAME=$PP_NAME"   >> "$GITHUB_ENV"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          rm /tmp/profile.mobileprovision /tmp/profile_decoded.plist

      # ── Archive ─────────────────────────────────────────────────────────────
      - name: Build archive
        run: |
          xcodebuild archive \
            -project ARKitDemo.xcodeproj \
            -scheme ARKitDemo \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/ARKitDemo.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PP_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            -allowProvisioningUpdates

      # ── Export IPA ──────────────────────────────────────────────────────────
      - name: Create ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.arkit.demo</key>
                  <string>$PP_UUID</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ARKitDemo.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist

      # ── Artifact ─────────────────────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ARKitDemo-${{ github.sha }}
          path: ${{ runner.temp }}/export/ARKitDemo.ipa
          retention-days: 14

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain || true
